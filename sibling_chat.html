<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chloe & Faith — Sibling Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Georgia', serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    max-width: 800px;
    padding: 24px 20px 12px;
    text-align: center;
    border-bottom: 1px solid #333;
    margin-bottom: 16px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 400;
    color: #c8c8d8;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 8px;
  }

  .day-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .day-nav button, .top-btn {
    background: #2a2a4a;
    border: 1px solid #444;
    color: #c8c8d8;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.2s;
  }

  .day-nav button:hover, .top-btn:hover { background: #3a3a5a; }
  .day-nav button:disabled { opacity: 0.3; cursor: default; }

  .day-nav .date-display {
    font-size: 20px;
    color: #a8d8ea;
    min-width: 160px;
    text-align: center;
  }

  /* Live mode toggle */
  .live-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .live-toggle label {
    font-size: 15px;
    color: #999;
    cursor: pointer;
    user-select: none;
  }

  .switch {
    position: relative;
    width: 48px;
    height: 26px;
  }

  .switch input { opacity: 0; width: 0; height: 0; }

  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #444;
    border-radius: 26px;
    transition: 0.3s;
  }

  .slider:before {
    content: "";
    position: absolute;
    height: 20px; width: 20px;
    left: 3px; bottom: 3px;
    background: #ccc;
    border-radius: 50%;
    transition: 0.3s;
  }

  .switch input:checked + .slider { background: #4caf50; }
  .switch input:checked + .slider:before { transform: translateX(22px); }

  .live-indicator {
    display: none;
    width: 8px; height: 8px;
    background: #4caf50;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  .live-indicator.active { display: inline-block; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-bar {
    font-size: 13px;
    color: #888;
    margin-top: 4px;
  }

  .chat-container {
    width: 100%;
    max-width: 800px;
    flex: 1;
    padding: 0 20px 40px;
    overflow-y: auto;
  }

  .message {
    margin-bottom: 20px;
    padding: 16px 20px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 19px;
    max-width: 85%;
    position: relative;
  }

  .message .sender {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 6px;
    display: block;
  }

  .message .time {
    font-size: 12px;
    color: #999;
    position: absolute;
    top: 16px;
    right: 16px;
  }

  .message .text {
    font-size: 19px;
    line-height: 1.65;
  }

  /* Chloe — left, blue */
  .message.chloe {
    background: #1e2d4a;
    border-left: 4px solid #a8d8ea;
    margin-right: auto;
  }
  .message.chloe .sender { color: #a8d8ea; }

  /* Faith — right, warm */
  .message.faith {
    background: #3a2020;
    border-right: 4px solid #f4a460;
    border-left: none;
    margin-left: auto;
  }
  .message.faith .sender { color: #f4a460; }

  .empty-state {
    text-align: center;
    color: #666;
    font-size: 20px;
    margin-top: 80px;
    font-style: italic;
  }

  .empty-state .subtitle {
    font-size: 15px;
    margin-top: 8px;
    color: #555;
  }

  /* Scrollbar */
  .chat-container::-webkit-scrollbar { width: 8px; }
  .chat-container::-webkit-scrollbar-track { background: #111; }
  .chat-container::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

  /* Top-right buttons */
  .top-buttons {
    position: fixed;
    top: 12px;
    right: 16px;
    display: flex;
    gap: 8px;
  }

  .top-btn {
    font-size: 14px;
    padding: 6px 12px;
  }

  /* Light mode */
  body.light {
    background: #f5f5f0;
    color: #333;
  }
  body.light header { border-bottom-color: #ccc; }
  body.light header h1 { color: #444; }
  body.light .day-nav button, body.light .top-btn { background: #e8e8e0; border-color: #bbb; color: #444; }
  body.light .day-nav button:hover, body.light .top-btn:hover { background: #ddd; }
  body.light .day-nav .date-display { color: #2a5a7a; }
  body.light .message.chloe { background: #e8f4f8; border-left-color: #4a9ab5; }
  body.light .message.chloe .sender { color: #2a6a8a; }
  body.light .message.faith { background: #faf0e6; border-right-color: #d4874a; }
  body.light .message.faith .sender { color: #b06030; }
  body.light .message .time { color: #999; }
  body.light .status-bar { color: #999; }
  body.light .empty-state { color: #aaa; }
  body.light .empty-state .subtitle { color: #bbb; }
  body.light .live-toggle label { color: #666; }
  body.light .slider { background: #bbb; }
</style>
</head>
<body>

<div class="top-buttons">
  <button class="top-btn" onclick="toggleTheme()">Light/Dark</button>
</div>

<header>
  <h1>Chloe & Faith</h1>
  <div class="controls">
    <div class="day-nav">
      <button id="btn-prev" onclick="changeDay(-1)">&larr;</button>
      <span class="date-display" id="date-display"></span>
      <button id="btn-next" onclick="changeDay(1)">&rarr;</button>
    </div>
    <div class="live-toggle">
      <label class="switch">
        <input type="checkbox" id="live-check" onchange="toggleLive()">
        <span class="slider"></span>
      </label>
      <label for="live-check">Live</label>
      <span class="live-indicator" id="live-dot"></span>
    </div>
  </div>
  <div class="status-bar" id="status-bar">Loading...</div>
</header>

<div class="chat-container" id="chat-container"></div>

<script>
const CHAT_DIR = 'data/sibling_chat';

let currentDate = (() => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); })();
let autoRefreshTimer = null;
let lastMessageCount = 0;
let liveMode = false;

// ── Live Mode ──

async function fetchLiveMode() {
  try {
    const resp = await fetch('/api/live_mode');
    if (resp.ok) {
      const data = await resp.json();
      liveMode = data.live;
      document.getElementById('live-check').checked = liveMode;
      document.getElementById('live-dot').classList.toggle('active', liveMode);
      updateRefreshRate();
    }
  } catch { /* server not running or no API */ }
}

async function toggleLive() {
  const on = document.getElementById('live-check').checked;
  try {
    const resp = await fetch('/api/live_mode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ live: on })
    });
    if (resp.ok) {
      const data = await resp.json();
      liveMode = data.live;
    }
  } catch {
    // If API not available, just toggle locally
    liveMode = on;
  }
  document.getElementById('live-dot').classList.toggle('active', liveMode);
  updateRefreshRate();
}

function updateRefreshRate() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  const interval = liveMode ? 10000 : 60000;  // 10s live, 60s hourly
  autoRefreshTimer = setInterval(() => {
    const today = (() => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); })();
    if (currentDate === today) loadMessages();
  }, interval);
}

// ── Date Navigation ──

function formatDateDisplay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const today = (() => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); })();
  const options = { weekday: 'long', month: 'long', day: 'numeric' };
  const formatted = d.toLocaleDateString('en-US', options);
  return dateStr === today ? `Today — ${formatted}` : formatted;
}

function changeDay(delta) {
  const d = new Date(currentDate + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  currentDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  lastMessageCount = 0;
  loadMessages();
}

// ── Message Loading ──

async function loadMessages() {
  const container = document.getElementById('chat-container');
  const dateDisplay = document.getElementById('date-display');
  const statusBar = document.getElementById('status-bar');

  dateDisplay.textContent = formatDateDisplay(currentDate);

  const today = (() => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); })();
  document.getElementById('btn-next').disabled = (currentDate >= today);

  try {
    const url = `${CHAT_DIR}/${currentDate}.json?_=${Date.now()}`;
    const resp = await fetch(url);

    if (!resp.ok) {
      container.innerHTML = `
        <div class="empty-state">
          No conversation on this day.
          <div class="subtitle">They might not have started talking yet, or check the date.</div>
        </div>`;
      statusBar.textContent = `No messages for ${currentDate}`;
      lastMessageCount = 0;
      return;
    }

    const messages = await resp.json();

    if (!messages || messages.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          Quiet day.
          <div class="subtitle">No messages yet. They chat about once an hour.</div>
        </div>`;
      statusBar.textContent = 'Waiting for first message...';
      lastMessageCount = 0;
      return;
    }

    // Only re-render if message count changed
    if (messages.length === lastMessageCount) return;
    lastMessageCount = messages.length;

    container.innerHTML = messages.map(m => {
      const sender = (m.sender || '?').toLowerCase();
      const senderDisplay = m.sender || '?';
      const time = formatTime(m.timestamp);
      const text = escapeHtml(m.text || '');

      return `
        <div class="message ${sender}">
          <span class="sender">${senderDisplay}</span>
          <span class="time">${time}</span>
          <div class="text">${text}</div>
        </div>`;
    }).join('');

    container.scrollTop = container.scrollHeight;

    const mode = liveMode ? 'LIVE — refreshing every 10s' : 'refreshes every 60s';
    statusBar.textContent = `${messages.length} message${messages.length !== 1 ? 's' : ''} today — ${mode}`;

  } catch (e) {
    container.innerHTML = `
      <div class="empty-state">
        Could not load chat data.
        <div class="subtitle">
          Start the chat server from the Offspring directory:<br>
          <code style="color:#a8d8ea">python chat_server.py</code><br>
          Then open <code style="color:#a8d8ea">http://localhost:8090/sibling_chat.html</code>
        </div>
      </div>`;
    statusBar.textContent = 'Error loading — see instructions above';
  }
}

function formatTime(ts) {
  if (!ts) return '?';
  try {
    const d = new Date(ts);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  } catch { return '?'; }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ── Theme ──

function toggleTheme() {
  document.body.classList.toggle('light');
  localStorage.setItem('sibchat-theme',
    document.body.classList.contains('light') ? 'light' : 'dark');
}

if (localStorage.getItem('sibchat-theme') === 'light') {
  document.body.classList.add('light');
}

// ── Init ──

fetchLiveMode();
loadMessages();
updateRefreshRate();
</script>

</body>
</html>
